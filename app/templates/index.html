<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        form { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 8px; font-size: 14px; }
        button { padding: 8px 16px; background: #0070f3; color: white; border: none; cursor: pointer; }
        button:hover { background: #0051a2; }
        ul { list-style: none; padding: 0; }
        li { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        li.done span { text-decoration: line-through; color: #999; }
        .actions a { margin-left: 10px; font-size: 13px; color: #0070f3; text-decoration: none; }
        .actions a.del { color: #e00; }
    </style>
</head>
<body>
    <h1>Todo List</h1>

    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="Add a new todo..." required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for todo in todos %}
        <li class="{{ 'done' if todo.completed else '' }}">
            <span>{{ todo.title }}</span>
            <div class="actions">
                {% if not todo.completed %}
                <a href="/complete/{{ todo._id }}">Complete</a>
                {% endif %}
                <a href="/delete/{{ todo._id }}" class="del">Delete</a>
            </div>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
